  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

out(startParticles, 2600);\n  };\n\n  let particlesOn = false;\n  function startParticles() {\n    if (particlesOn) return;\n    particlesOn = true;\n    const parts = arcs.map(a => {\n      const c = document.createElementNS(NS, 'circle');\n      c.setAttribute('r', '1.9');\n      c.setAttribute('fill', '#C8102E');\n      partsG.appendChild(c);\n      return { c, a };\n    });\n    let visible = true;\n    new IntersectionObserver(es => es.forEach(e => { visible = e.isIntersecting; }), { threshold: 0 }).observe(svg);\n    (function loop(now) {\n      if (visible) parts.forEach(p => {\n        const t = ((now / 4200) + p.a.phase) % 1;\n        const pt = p.a.path.getPointAtLength(t * p.a.len);\n        p.c.setAttribute('cx', pt.x); p.c.setAttribute('cy', pt.y);\n        p.c.setAttribute('opacity', t < .05 || t > .95 ? '0' : '.75');\n      });\n      requestAnimationFrame(loop);\n    })(performance.now());\n  }\n\n  if (reduced) { revealMap(); return; }\n  arcs.forEach(a => { a.g.style.opacity = '0'; a.lbl.style.opacity = '0'; });\n  hub.style.opacity = '0';\n  const io = new IntersectionObserver(es => es.forEach(e => {\n    if (e.isIntersecting) { revealMap(); io.disconnect(); }\n  }), { threshold: 0.35 });\n  io.observe(svg);\n}\n\n\n// ===== Real SVG world map (v5) =====\nasync function buildMap(data, reduced) {\n  const mount = document.getElementById('map-mount');\n  if (!mount || mount.dataset.built) return;\n  mount.dataset.built = '1';\n  const RED = '#C8102E', GOLD = '#C9A24B', INK = '#3A3F52';\n  const VB = { x: 150, y: 235, w: 762, h: 250 };\n  const TASHKENT = data.TASHKENT, PARTNERS = data.MAP_PARTNERS;\n\n  let svgText;\n  try { const wu = (window.__resources && window.__resources.worldSvg) || 'world.svg'; svgText = await (await fetch(wu)).text(); }\n  catch (e) { document.getElementById('map-loading').textContent = ''; return; }\n  const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');\n  const svg = doc.querySelector('svg');\n  const NS = 'http://www.w3.org/2000/svg';\n  svg.setAttribute('viewBox', `${VB.x} ${VB.y} ${VB.w} ${VB.h}`);\n  svg.removeAttribute('width'); svg.removeAttribute('height');\n  svg.setAttribute('style', 'width:100%;height:auto;display:block');\n  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');\n\n  const partnerIds = new Set(PARTNERS.map(p => p.id));\n  [...svg.querySelectorAll('path')].forEach((el, i) => {\n    const base = i % 2 ? '#FBFCFE' : '#F2F5FB';\n    el.dataset.base = base;\n    el.style.fill = base;\n    el.style.stroke = 'rgba(200,16,46,.22)';\n    el.style.strokeWidth = '0.5';\n    el.classList.add('sfad-country');\n    if (partnerIds.has(el.id)) el.classList.add('sfad-partner');\n  });\n  const uz = svg.getElementById('UZ');\n  if (uz) { uz.style.fill = RED; uz.dataset.base = RED; uz.classList.remove('sfad-partner'); }\n\n  // overlay group (markers, arcs, plane) in same coordinate space\n  const overlay = document.createElementNS(NS, 'g');\n  svg.appendChild(overlay);\n  const arc = document.createElementNS(NS, 'path');\n  arc.setAttribute('fill', 'none');\n  arc.setAttribute('stroke', INK);\n  arc.setAttribute('stroke-width', '1.4');\n  arc.setAttribute('stroke-dasharray', '4 6');\n  arc.setAttribute('stroke-linecap', 'round');\n  arc.setAttribute('opacity', '0');\n  if (!reduced) arc.style.animation = 'dashFlow 1s linear infinite';\n  overlay.appendChild(arc);\n  let planeG = null;\n\n  // Tashkent hub\n  const hub = document.createElementNS(NS, 'g');\n  hub.setAttribute('transform', `translate(${TASHKENT.x},${TASHKENT.y})`);\n  hub.innerHTML = `<circle r=\"6\" fill=\"none\" stroke=\"${RED}\" stroke-width=\"1\" style=\"${reduced?'':'animation:pulseRing 2.4s ease-out infinite'};transform-origin:center;transform-box:fill-box\"><\u002Fcircle><circle r=\"9\" fill=\"none\" stroke=\"${RED}\" stroke-width=\".7\" style=\"${reduced?'':'animation:pulseRing 2.4s ease-out .6s infinite'};transform-origin:center;transform-box:fill-box\"><\u002Fcircle><circle r=\"3\" fill=\"#fff\" stroke=\"${RED}\" stroke-width=\"1.6\"><\u002Fcircle><text y=\"-10\" text-anchor=\"middle\" style=\"font:700 8px Manrope,sans-serif;fill:${RED};paint-order:stroke;stroke:#fff;stroke-width:2.4px;stroke-linejoin:round\">Toshkent<\u002Ftext>`;\n  overlay.appendChild(hub);\n\n  const mobile = innerWidth < 760;\n  // partner labels\n  PARTNERS.forEach(p => {\n    const t = document.createElementNS(NS, 'text');\n    t.setAttribute('x', p.x); t.setAttribute('y', p.y - 5);\n    t.setAttribute('text-anchor', 'middle');\n    t.setAttribute('style', `font:600 6.4px Manrope,sans-serif;fill:#8A8F9C;paint-order:stroke;stroke:#fff;stroke-width:1.8px;stroke-linejoin:round;pointer-events:none;opacity:${mobile?0:0.9}`);\n    t.textContent = p.name;\n    t.dataset.pid = p.id;\n    overlay.appendChild(t);\n    const dot = document.createElementNS(NS, 'circle');\n    dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y); dot.setAttribute('r', '2');\n    dot.setAttribute('fill', GOLD); dot.setAttribute('opacity', '.55');\n    overlay.appendChild(dot);\n  });\n\n  mount.querySelector('#map-loading').remove();\n  mount.insertBefore(svg, mount.firstChild);\n\n  const tip = document.getElementById('map-tooltip');\n  const arcPath = (a, b) => {\n    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;\n    const dist = Math.hypot(b.x - a.x, b.y - a.y);\n    return `M ${a.x} ${a.y} Q ${mx} ${my - dist * 0.22} ${b.x} ${b.y}`;\n  };\n\n  // chips\n  const chipWrap = document.getElementById('partner-chips');\n  let cur = -1, timer = null, paused = false;\n  PARTNERS.forEach((p, i) => {\n    const b = document.createElement('button');\n    b.type = 'button';\n    b.dataset.i = i;\n    b.style.cssText = 'display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--white);color:var(--ink);font:600 13px Manrope;padding:8px 15px;border-radius:99px;cursor:pointer;transition:all .3s';\n    b.innerHTML = `<span style=\"font-size:15px\">${p.flag}<\u002Fspan><span>${p.name}<\u002Fspan>`;\n    b.addEventListener('click', () => { activate(i); paused = true; clearTimeout(timer); timer = setTimeout(() => { paused = false; cycle(); }, 8000); });\n    chipWrap.appendChild(b);\n  });\n\n  function toPct(pt) { return { l: (pt.x - VB.x) / VB.w * 100, t: (pt.y - VB.y) / VB.h * 100 }; }\n\n  function activate(i) {\n    if (i === cur) return;\n    if (cur >= 0) { const prev = svg.getElementById(PARTNERS[cur].id); if (prev) prev.style.fill = prev.dataset.base; }\n    cur = i;\n    const p = PARTNERS[i];\n    const el = svg.getElementById(p.id);\n    if (el) el.style.fill = GOLD;\n    arc.setAttribute('d', arcPath(TASHKENT, p));\n    arc.setAttribute('opacity', '1');\n    // tooltip\n    const pos = toPct(p);\n    tip.style.left = pos.l + '%'; tip.style.top = pos.t + '%';\n    tip.innerHTML = `${p.flag}&nbsp; ${p.name}`;\n    tip.style.opacity = '1';\n    // chips\n    chipWrap.querySelectorAll('button').forEach(b => {\n      const on = +b.dataset.i === i;\n      b.style.background = on ? RED : 'var(--white)';\n      b.style.color = on ? '#fff' : 'var(--ink)';\n      b.style.borderColor = on ? RED : 'var(--line)';\n    });\n    // labels highlight\n    overlay.querySelectorAll('text[data-pid]').forEach(t => { t.style.fill = t.dataset.pid === p.id ? RED : '#8A8F9C'; });\n    // plane\n    if (!reduced) flyPlane(p);\n  }\n\n  function flyPlane(p) {\n    if (planeG) planeG.remove();\n    planeG = document.createElementNS(NS, 'g');\n    const plane = document.createElementNS(NS, 'path');\n    plane.setAttribute('d', 'M7,0 L-5,3.6 L-2.4,0 L-5,-3.6 Z');\n    plane.setAttribute('fill', INK);\n    planeG.appendChild(plane);\n    const am = document.createElementNS(NS, 'animateMotion');\n    am.setAttribute('dur', '1.45s');\n    am.setAttribute('rotate', 'auto');\n    am.setAttribute('fill', 'freeze');\n    am.setAttribute('keyPoints', '0;1');\n    am.setAttribute('keyTimes', '0;1');\n    am.setAttribute('calcMode', 'spline');\n    am.setAttribute('keySplines', '0.22 1 0.36 1');\n    am.setAttribute('path', arcPath(TASHKENT, p));\n    planeG.appendChild(am);\n    overlay.appendChild(planeG);\n    if (am.beginElement) am.beginElement();\n  }\n\n  function cycle() {\n    if (paused) return;\n    activate((cur + 1) % PARTNERS.length);\n    timer = setTimeout(cycle, 3500);\n  }\n\n  // partner path click\n  PARTNERS.forEach((p, i) => {\n    const el = svg.getElementById(p.id);\n    if (el) el.addEventListener('click', () => { activate(i); paused = true; clearTimeout(timer); timer = setTimeout(() => { paused = false; cycle(); }, 8000); });\n  });\n\n  let started = false;\n  const start = () => { if (started) return; started = true; activate(0); timer = setTimeout(cycle, 3500); };\n  const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) { start(); io.disconnect(); } }), { threshold: 0.01 });\n  io.observe(mount);\n  setTimeout(start, 1200);\n}<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
